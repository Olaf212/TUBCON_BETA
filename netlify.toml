[build]
  command = ""
  publish = "."

[[redirects]]
  from = "/images/*"
  to = "/public/images/:splat"
  status = 200

[[redirects]]
  from = "/video/*"
  to = "/public/video/:splat"
  status = 200

[[headers]]
  for = "/public/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
